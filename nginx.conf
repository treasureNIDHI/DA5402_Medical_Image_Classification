user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml application/json application/javascript;

    # API is always present in both inference and full profiles
    upstream api_backend {
        server api:8001;
    }

    server {
        listen 80;
        server_name _;

        # Use Docker's internal DNS so optional upstreams
        # (mlflow, prometheus, grafana) are resolved per-request,
        # not at startup — prevents crash when profile omits them
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ── Frontend ──────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── API proxy (always available) ──────────────────────
        location /predict {
            proxy_pass http://api_backend/predict;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        location /health  { proxy_pass http://api_backend/health;  proxy_set_header Host $host; }
        location /healthz { proxy_pass http://api_backend/healthz; proxy_set_header Host $host; }
        location /readyz  { proxy_pass http://api_backend/readyz;  proxy_set_header Host $host; }
        location /metrics { proxy_pass http://api_backend/metrics; proxy_set_header Host $host; }
        location /docs    { proxy_pass http://api_backend/docs;    proxy_set_header Host $host; }
        location /openapi.json { proxy_pass http://api_backend/openapi.json; proxy_set_header Host $host; }

        location /api/ {
            proxy_pass http://api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Optional services (lazy DNS — no crash if absent) ─
        location /mlflow/ {
            set $mlflow mlflow:5000;
            proxy_pass http://$mlflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /prometheus/ {
            set $prom prometheus:9090;
            proxy_pass http://$prom/;
            proxy_set_header Host $host;
        }

        location /grafana/ {
            set $grafana grafana:3000;
            proxy_pass http://$grafana/;
            proxy_set_header Host $host;
        }

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
